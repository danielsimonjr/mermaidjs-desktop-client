appId: dev.skydiver.mermaidjs-desktop
productName: MermaidJS Desktop
directories:
  output: release
  buildResources: build

# Maximum compression on installer payloads. NOTE: this is a no-op for the
# current Squirrel.Windows target — Squirrel delegates to NuGet, which uses
# a fixed compression level — but will apply automatically if NSIS / DMG /
# AppImage targets are added later. Cheap to leave on.
compression: maximum

# Only ship what the app actually needs at runtime: compiled main, compiled
# renderer, and the real (not dev) dependencies declared in package.json.
files:
  - dist/**
  - dist-electron/**
  - package.json

# Main process entry — matches package.json "main".
# (electron-builder auto-detects but making it explicit is safer.)
extraMetadata:
  main: dist-electron/main.js

# Icon: a single 1024×1024 PNG + a multi-res Windows ICO. electron-builder
# derives the mac/linux variants automatically on build.
icon: build/icon.png

win:
  target:
    # squirrel = the installer format used by VSCode/Discord/Slack/Teams.
    # Produces `<productName>Setup.exe` + RELEASES + .nupkg. Installs
    # per-user to %LOCALAPPDATA%\MermaidJSDesktop and supports auto-update.
    - target: squirrel
      arch:
        - x64
  icon: build/icon.ico

squirrelWindows:
  # Installs per-user to %LOCALAPPDATA%\<productName>. Skipping loadingGif —
  # squirrel shows nothing during its brief unpack, so it's not needed.
  iconUrl: "https://raw.githubusercontent.com/danielsimonjr/mermaidjs-desktop-client/master/build/icon.ico"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  # icon: build/icon.icns

linux:
  target:
    - target: AppImage
    - target: deb
  category: Development
  # icon: build/icon.png

# Strip unused Electron locale pakfiles to keep the installer lean and
# shorten the file-scanning cost at first launch. The app UI is English-only.
afterPack: ./scripts/after-pack.js

# Skip re-signing and notarization by default — set CSC_LINK / APPLE_ID etc.
# in your environment to enable them for releases.

# Publish target for auto-update. Squirrel embeds this in the generated
# RELEASES file and latest.yml so an installed app knows where to look for
# updates. Local builds and CI builds work fine without GH_TOKEN — the
# artifacts are only uploaded when electron-builder is run with
# `--publish always` (or equivalent env flag). Without the flag the tag
# is still baked into the nupkg for runtime lookups.
publish:
  provider: github
  owner: danielsimonjr
  repo: mermaidjs-desktop-client
