<!--
  MermaidJS Desktop — app icon (source of truth).
  Linear-style dark surface + Mermaid-pink accent.
  Three connected nodes in a Y-formation evoke a flowchart diagram.
  Designed to stay legible down to 16×16 px: big dots, thick lines, no fine detail.
-->
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: rounded dark surface with subtle inner highlight -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1c22"/>
      <stop offset="1" stop-color="#0e0f13"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff528a"/>
      <stop offset="1" stop-color="#ff3670"/>
    </linearGradient>
    <!-- Soft accent halo for the decision node at top -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3670" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff3670" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Surface -->
  <rect width="1024" height="1024" rx="208" ry="208" fill="url(#bg)"/>
  <!-- Subtle 1px inner border to echo the Linear-style 1px panel stroke -->
  <rect x="4" y="4" width="1016" height="1016" rx="204" ry="204"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Decision-node halo -->
  <circle cx="512" cy="320" r="240" fill="url(#halo)"/>

  <!-- Connecting lines (behind the nodes so dots render cleanly) -->
  <g stroke="#9aa0ac" stroke-opacity="0.7" stroke-linecap="round" fill="none">
    <line x1="512" y1="320" x2="320" y2="720" stroke-width="18"/>
    <line x1="512" y1="320" x2="704" y2="720" stroke-width="18"/>
  </g>

  <!-- Nodes: top decision node as a diamond, two bottom leaves as circles -->
  <!-- Top: rotated square (diamond) representing a decision/branching node -->
  <g transform="translate(512 320) rotate(45)">
    <rect x="-92" y="-92" width="184" height="184" rx="28" ry="28" fill="url(#accent)"/>
  </g>

  <!-- Bottom-left node -->
  <circle cx="320" cy="720" r="92" fill="url(#accent)"/>
  <!-- Bottom-right node -->
  <circle cx="704" cy="720" r="92" fill="url(#accent)"/>

  <!-- Tiny inner dots to add a subtle highlight -->
  <circle cx="512" cy="292" r="8" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="300" cy="696" r="8" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="684" cy="696" r="8" fill="#ffffff" fill-opacity="0.25"/>
</svg>
